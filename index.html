<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランダムグループ作成ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-section {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 14px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            background-color: #f9fafb;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        
        .btn-block { width: 100%; }

        /* 出欠リストのスタイル */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        .student-checkbox {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .student-checkbox input {
            margin-right: 10px;
            transform: scale(1.2);
            accent-color: var(--danger);
        }

        .student-checkbox.absent {
            background: #fee2e2;
            border-color: #fca5a5;
            color: var(--danger);
            text-decoration: line-through;
        }

        /* 条件指定のタブ切り替え */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .config-input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .number-input {
            width: 80px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
        }

        /* シャッフルアニメーション用オーバーレイ */
        .shuffle-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .shuffle-box {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #67e8f9;
            text-shadow: 0 0 20px rgba(103, 232, 249, 0.5);
            min-height: 4.5rem;
        }

        /* 結果表示エリア（通常画面） */
        .result-controls {
            display: none;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .group-output-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .group-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .group-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
            color: var(--text-main);
        }

        .member-list { list-style: none; padding: 0; margin: 0; }
        .member-list li { padding: 6px 0; font-size: 1rem; border-bottom: 1px dashed #e2e8f0; }
        .member-list li:last-child { border-bottom: none; }

        /* 【修正ポイント】固定値だった height: 1080px を min-height に変更し、縦に伸びるよう調整 */
        #hidden-theater-stage {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1920px;
            min-height: 1080px;
            background: #0f172a; /* 縦伸び時のグラデーション切れを防ぐため、ベースを濃紺に固定 */
            background-image: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            padding: 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .theater-header {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 50px;
            color: #38bdf8;
            letter-spacing: 2px;
        }

        .theater-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-content: flex-start;
            width: 100%;
        }

        .theater-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            width: 280px;
            box-sizing: border-box;
        }

        .theater-group-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f43f5e;
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .theater-member-list { list-style: none; padding: 0; margin: 0; text-align: center;}
        .theater-member-list li { font-size: 1.6rem; padding: 8px 0; font-weight: 600; color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 ランダムグループ作成ツール</h1>

    <div class="card-section">
        <div class="section-title">👥 1. 生徒名簿の登録</div>
        <textarea id="raw-names" placeholder="名前を【改行】のみで区切って入力してください。&#13;（例）&#13;山田 太郎&#13;佐藤 花子"></textarea>
        <button class="btn btn-block" style="margin-top: 12px;" onclick="processRegisteredNames()">名簿を確定して出欠確認へ</button>
    </div>

    <div id="section-attendance" class="card-section" style="display: none;">
        <div class="section-title">✅ 2. 出欠確認 (クリックで欠席に切替)</div>
        <div class="student-grid" id="student-grid"></div>
    </div>

    <div id="section-config" class="card-section" style="display: none;">
        <div class="section-title">⚙️ 3. 条件指定</div>
        <div class="tab-container">
            <div id="tab-size" class="tab active" onclick="switchMode('size')">1班あたりの人数で指定</div>
            <div id="tab-count" class="tab" onclick="switchMode('count')">総グループ数で指定</div>
        </div>
        
        <div class="config-input-wrap">
            <span id="config-label">1班あたりの人数:</span>
            <input type="number" id="config-number" class="number-input" value="4" min="1">
            <span id="config-unit">人組</span>
        </div>
        
        <button class="btn btn-success btn-block" style="margin-top: 20px; font-size: 1.1rem;" onclick="startShuffleAnimation()">🎲 グループを編成する！</button>
    </div>

    <div class="result-controls" id="result-controls">
        <button class="btn" style="background-color: #8b5cf6;" onclick="exportToImage()">📺 スクリーン用横向き画像を出力</button>
    </div>
    <div class="group-output-container" id="result-container"></div>
</div>

<div class="shuffle-overlay" id="shuffle-overlay">
    <div style="font-size: 1.5rem; margin-bottom: 10px; color: #94a3b8;">シャッフル！</div>
    <div class="shuffle-box" id="shuffle-box">---</div>
    <div style="font-size: 1.2rem; color: #e2e8f0;">グループを編成します(^^)</div>
</div>

<div id="hidden-theater-stage">
    <div class="theater-header" id="theater-title">👥 グループ分け結果</div>
    <div class="theater-grid" id="theater-grid"></div>
</div>

<script {
}>
    let students = [];
    let currentMode = 'size'; // 'size' or 'count'
    let lastGeneratedGroups = []; // 画像出力用に結果を一時保持

    window.onload = function() {
        const savedNames = localStorage.getItem('saved_student_names');
        if (savedNames) {
            document.getElementById('raw-names').value = savedNames;
            processRegisteredNames();
        }
    };

    function processRegisteredNames() {
        const text = document.getElementById('raw-names').value;
        const rawList = text.split(/\r?\n/).map(name => name.trim()).filter(name => name !== "");

        if (rawList.length === 0) {
            alert("生徒の名前を入力してください。");
            return;
        }

        localStorage.setItem('saved_student_names', text);
        students = rawList.map(name => ({ name: name, isAbsent: false }));

        renderAttendanceGrid();
        document.getElementById('section-attendance').style.display = 'block';
        document.getElementById('section-config').style.display = 'block';
        document.getElementById('result-container').innerHTML = '';
        document.getElementById('result-controls').style.display = 'none';
    }

    function renderAttendanceGrid() {
        const grid = document.getElementById('student-grid');
        grid.innerHTML = '';

        students.forEach((student, index) => {
            const div = document.createElement('div');
            div.className = `student-checkbox ${student.isAbsent ? 'absent' : ''}`;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = student.isAbsent;
            checkbox.onclick = (e) => {
                e.stopPropagation();
                toggleStudentAbsence(index);
            };

            div.onclick = () => toggleStudentAbsence(index);
            div.appendChild(checkbox);
            div.appendChild(document.createTextNode(student.name));
            grid.appendChild(div);
        });
    }

    function toggleStudentAbsence(index) {
        students[index].isAbsent = !students[index].isAbsent;
        renderAttendanceGrid();
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('tab-size').className = `tab ${mode === 'size' ? 'active' : ''}`;
        document.getElementById('tab-count').className = `tab ${mode === 'count' ? 'active' : ''}`;
        
        if (mode === 'size') {
            document.getElementById('config-label').innerText = "1班あたりの人数:";
            document.getElementById('config-unit').innerText = "人組";
            document.getElementById('config-number').value = "4";
        } else {
            document.getElementById('config-label').innerText = "生成する総グループ数:";
            document.getElementById('config-unit').innerText = "グループ";
            document.getElementById('config-number').value = "6";
        }
    }

    function startShuffleAnimation() {
        let presentStudents = students.filter(s => !s.isAbsent).map(s => s.name);
        if (presentStudents.length === 0) {
            alert("出席者が誰も選択されていません！");
            return;
        }

        const overlay = document.getElementById('shuffle-overlay');
        const box = document.getElementById('shuffle-box');
        overlay.style.display = 'flex';

        let counter = 0;
        const interval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * presentStudents.length);
            box.innerText = presentStudents[randomIndex];
            counter++;
            if (counter > 25) {
                clearInterval(interval);
                overlay.style.display = 'none';
                executeGroupLogic(presentStudents);
            }
        }, 50);
    }

    function executeGroupLogic(presentStudents) {
        const targetNumber = parseInt(document.getElementById('config-number').value);
        if (isNaN(targetNumber) || targetNumber <= 0) {
            alert("有効な数値を入力してください。");
            return;
        }

        for (let i = presentStudents.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [presentStudents[i], presentStudents[j]] = [presentStudents[j], presentStudents[i]];
        }

        let groups = [];

        if (currentMode === 'size') {
            while (presentStudents.length > 0) {
                groups.push(presentStudents.splice(0, targetNumber));
            }
            if (groups.length > 1 && groups[groups.length - 1].length === 1) {
                const lone = groups.pop()[0];
                groups[groups.length - 1].push(lone);
            }
        } else {
            for (let i = 0; i < targetNumber; i++) {
                groups.push([]);
            }
            presentStudents.forEach((student, index) => {
                groups[index % targetNumber].push(student);
            });
            groups = groups.filter(g => g.length > 0);
        }

        lastGeneratedGroups = groups; 
        renderNormalResults(groups);
    }

    function renderNormalResults(groups) {
        const container = document.getElementById('result-container');
        container.innerHTML = '';
        document.getElementById('result-controls').style.display = 'flex';

        groups.forEach((group, index) => {
            const card = document.createElement('div');
            card.className = 'group-card';
            card.innerHTML = `<div class="group-name">グループ ${index + 1} (${group.length}人)</div>`;
            
            const ul = document.createElement('ul');
            ul.className = 'member-list';
            group.forEach(m => {
                ul.innerHTML += `<li>${m}</li>`;
            });
            card.appendChild(ul);
            container.appendChild(card);
        });
    }

    // 【修正ポイント】html2canvasの撮影範囲を、コンテンツの高さに自動フィットさせる
    function exportToImage() {
        if (lastGeneratedGroups.length === 0) return;

        const gridStage = document.getElementById('theater-grid');
        gridStage.innerHTML = '';

        lastGeneratedGroups.forEach((group, index) => {
            const card = document.createElement('div');
            card.className = 'theater-card';
            card.innerHTML = `<div class="theater-group-name">第 ${index + 1} 班</div>`;
            
            const ul = document.createElement('ul');
            ul.className = 'theater-member-list';
            group.forEach(m => {
                ul.innerHTML += `<li>${m}</li>`;
            });
            card.appendChild(ul);
            gridStage.appendChild(card);
        });

        const target = document.getElementById('hidden-theater-stage');
        
        // 撮影前に、中身がどれだけの高さになっているかをミリ秒単位で計測して反映させる
        // これにより、グループ数が多くて下にはみ出しても、動的に縦幅が拡張されます
        html2canvas(target, {
            width: 1920,
            height: target.scrollHeight, // 1080に固定せず、中身の総スクロール高さに合わせる
            scale: 2,
            windowHeight: target.scrollHeight
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `グループ分け結果_${new Date().toLocaleDateString()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>

</body>
</html>
